<!DOCTYPE html>
<html>
<head>
    <title>Word Guessing Experiment</title>
    <script src="https://unpkg.com/jspsych@7.3.1"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.2"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.2"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.2"></script>
    <script src="https://unpkg.com/@jspsych/plugin-preload@1.1.2"></script>
    <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe"></script>
    <link href="https://unpkg.com/jspsych@7.3.1/css/jspsych.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

    <style>
        /* ---- Passage display ---- */

        .sentence-container {
            font-size: 24px;
            line-height: 2.8;
            margin: 40px auto;
            text-align: center;
            max-width: 900px;
        }

        .word {
            display: inline-block;
            margin: 0 3px;
            padding: 3px 8px;
            border-radius: 4px;
        }

        /* Target (bolded jabberwocky word — never revealed) */
        .word.target {
            font-weight: bold;
            background-color: transparent;
            border: none;
            cursor: default;
        }

        /* ---- Baseline-section styles ---- */

        /* A nonce/jabberwocky word shown in the baseline passage.
           Styled subtly so participants can see it differs from real words,
           but not distractingly — it is simply unreadable nonsense. */
        .word.nonce {
            color: #555;
            background-color: transparent;
            border: none;
            cursor: default;
        }

        /* ---- Sampling-section styles ---- */

        /* A nonce word not yet revealed in the sampling section.
           Grey background hints that this word can be "decoded". */
        .word.sampling-masked {
            background-color: #e8e8e8;
            border: 2px solid #bbb;
            color: #666;
            cursor: default;
        }

        /* A word that has been revealed in the sampling section. */
        .word.sampling-revealed {
            background-color: #c8e6c9;
            border: 2px solid #4caf50;
            color: #1b5e20;
            cursor: default;
        }

        /* ---- Controls ---- */

        .controls {
            margin: 30px 0;
            text-align: center;
        }

        .guess-button {
            background-color: #2196f3;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 0 10px;
        }

        .guess-button:hover   { background-color: #1976d2; }
        .guess-button:disabled { background-color: #ccc; cursor: not-allowed; }

        .reveal-button {
            background-color: #ff9800;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 0 10px;
        }

        .reveal-button:hover   { background-color: #e65100; }
        .reveal-button:disabled { background-color: #ccc; cursor: not-allowed; }

        /* ---- Points counter (sampling section only) ---- */

        .points-counter {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 20px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            transition: color 0.3s ease;
        }

        /* ---- Trial counter ---- */

        .trial-counter {
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
            color: #666;
        }

        /* ---- Instructions text ---- */

        .instructions {
            max-width: 700px;
            margin: 0 auto 30px auto;
            text-align: left;
            font-size: 16px;
            line-height: 2;
        }
    </style>
</head>
<body>
    <script src="experiment_v2.js"></script>
</body>
</html>
